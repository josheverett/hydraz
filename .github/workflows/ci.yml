name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  check:
    name: Typecheck & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: pnpm/action-setup@v4
        with:
          version: 10.1.0
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
